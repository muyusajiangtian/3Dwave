<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Gesture 3D Controller - Dual Hand</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: #fff;
        }
        #container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        #video-panel {
            width: 35%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d0d15;
            border-right: 1px solid #1a1a2e;
            position: relative;
        }
        #video-wrapper {
            position: relative;
            width: 90%;
            max-width: 480px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.15);
        }
        #webcam {
            width: 100%;
            display: block;
            transform: scaleX(-1);
        }
        #canvas-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }
        #gesture-info {
            margin-top: 15px;
            width: 90%;
            max-width: 480px;
            display: flex;
            gap: 10px;
        }
        .hand-info {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            font-size: 12px;
        }
        .hand-info.left-hand { border-left: 3px solid #4facfe; }
        .hand-info.right-hand { border-left: 3px solid #f093fb; }
        .hand-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .hand-gesture {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .left-hand .hand-gesture { color: #4facfe; }
        .right-hand .hand-gesture { color: #f093fb; }
        .hand-confidence {
            font-size: 10px;
            color: #666;
        }
        .hand-digit {
            font-size: 20px;
            font-weight: bold;
            margin-top: 4px;
        }
        .left-hand .hand-digit { color: #43e97b; }
        .right-hand .hand-digit { color: #fee140; }
        #dual-status {
            margin-top: 8px;
            padding: 6px 14px;
            background: rgba(255, 200, 50, 0.08);
            border: 1px solid rgba(255, 200, 50, 0.2);
            border-radius: 6px;
            font-size: 11px;
            color: #fda;
            text-align: center;
            width: 90%;
            max-width: 480px;
            display: none;
        }
        #three-panel {
            width: 65%;
            height: 100%;
            position: relative;
        }
        #three-canvas {
            width: 100%; height: 100%;
            display: block;
        }
        #fps-counter {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 12px;
            color: #4f4;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 10;
        }
        #status {
            position: absolute;
            top: 10px; left: 15px;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(0,0,0,0.6);
            z-index: 10;
        }
        .connected { color: #4f4; }
        .disconnected { color: #f44; }
        #title-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 12px 20px;
            background: linear-gradient(180deg, rgba(10,10,15,0.9), transparent);
            z-index: 10;
            pointer-events: none;
        }
        #title-bar h1 {
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #error-display {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.4);
            color: #faa;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            display: none;
            z-index: 20;
        }
        #reset-indicator {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 12px;
            border: 2px solid #4facfe;
            display: none;
            z-index: 30;
            animation: pulse-border 0.5s ease-in-out;
        }
        @keyframes pulse-border {
            0%, 100% { border-color: #4facfe; }
            50% { border-color: #f093fb; }
        }
        #proximity-bar {
            position: absolute;
            bottom: 60px; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            display: none;
            z-index: 15;
        }
        #proximity-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4facfe, #f093fb);
            border-radius: 3px;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div id="title-bar"><h1>Magic Gesture 3D Controller - Dual Hand</h1></div>
    <div id="container">
        <div id="video-panel">
            <div id="video-wrapper">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="canvas-overlay"></canvas>
            </div>
            <div id="gesture-info">
                <div class="hand-info left-hand">
                    <div class="hand-label">LEFT HAND</div>
                    <div class="hand-gesture" id="left-gesture">--</div>
                    <div class="hand-confidence" id="left-conf">conf: --</div>
                    <div class="hand-digit" id="left-digit"></div>
                </div>
                <div class="hand-info right-hand">
                    <div class="hand-label">RIGHT HAND</div>
                    <div class="hand-gesture" id="right-gesture">--</div>
                    <div class="hand-confidence" id="right-conf">conf: --</div>
                    <div class="hand-digit" id="right-digit"></div>
                </div>
            </div>
            <div id="dual-status"></div>
        </div>
        <div id="three-panel">
            <canvas id="three-canvas"></canvas>
            <div id="fps-counter">FPS: --</div>
            <div id="status" class="disconnected">● Disconnected</div>
            <div id="reset-indicator">RESET</div>
            <div id="proximity-bar"><div id="proximity-fill"></div></div>
            <div id="error-display"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
    <script>if (typeof THREE === 'undefined') document.write('<script src="/static/three.min.js"><\/script>');</script>
    <script>
    window.addEventListener('DOMContentLoaded', function() {
        if (typeof THREE === 'undefined') {
            document.getElementById('error-display').textContent = 'Three.js failed to load';
            document.getElementById('error-display').style.display = 'block';
            return;
        }

        // === Audio ===
        var audioCtx = null;
        function playWhoosh() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                var d = 0.3, t = audioCtx.currentTime;
                var osc = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                var filter = audioCtx.createBiquadFilter();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, t);
                osc.frequency.exponentialRampToValueAtTime(200, t + d);
                filter.type = 'bandpass'; filter.frequency.setValueAtTime(1000, t);
                filter.frequency.exponentialRampToValueAtTime(300, t + d); filter.Q.value = 2;
                gain.gain.setValueAtTime(0.25, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + d);
                osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(t + d);
            } catch (e) {}
        }
        function playExplosion() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                var d = 0.5, t = audioCtx.currentTime;
                var noise = audioCtx.createBufferSource();
                var buf = audioCtx.createBuffer(1, audioCtx.sampleRate * d, audioCtx.sampleRate);
                var data = buf.getChannelData(0);
                for (var i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.1));
                noise.buffer = buf;
                var gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.4, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + d);
                noise.connect(gain); gain.connect(audioCtx.destination);
                noise.start(); noise.stop(t + d);
            } catch (e) {}
        }

        // === WebSocket ===
        var ws = null, wsReady = false;
        var statusEl = document.getElementById('status');
        function connectWS() {
            try {
                ws = new WebSocket('ws://' + location.host + '/ws');
                ws.onopen = function() { wsReady = true; statusEl.textContent = '● Connected'; statusEl.className = 'connected'; };
                ws.onclose = function() { wsReady = false; statusEl.textContent = '● Disconnected'; statusEl.className = 'disconnected'; setTimeout(connectWS, 2000); };
                ws.onerror = function() { ws.close(); };
                ws.onmessage = function(ev) { try { handleMessage(JSON.parse(ev.data)); } catch(e) {} };
            } catch(e) { setTimeout(connectWS, 3000); }
        }
        connectWS();

        // === Camera ===
        var video = document.getElementById('webcam');
        var overlay = document.getElementById('canvas-overlay');
        var overlayCtx = overlay.getContext('2d');
        var sendCanvas = document.createElement('canvas');
        sendCanvas.width = 320; sendCanvas.height = 240;
        var sendCtx = sendCanvas.getContext('2d');

        navigator.mediaDevices.getUserMedia({
            video: { width: 320, height: 240, frameRate: { ideal: 20, max: 30 } }
        }).then(function(stream) {
            video.srcObject = stream;
            video.onloadedmetadata = function() {
                overlay.width = video.videoWidth;
                overlay.height = video.videoHeight;
                startSending();
            };
        }).catch(function(err) {
            document.getElementById('left-gesture').textContent = 'No Camera';
        });

        var lastSendTime = 0;
        var SEND_INTERVAL = 55;
        function startSending() {
            function tick() {
                requestAnimationFrame(tick);
                var now = performance.now();
                if (now - lastSendTime < SEND_INTERVAL || !wsReady) return;
                lastSendTime = now;
                sendCtx.drawImage(video, 0, 0, 320, 240);
                try { ws.send(JSON.stringify({ type: 'frame', data: sendCanvas.toDataURL('image/jpeg', 0.55) })); } catch(e) {}
            }
            tick();
        }

        // === UI Elements ===
        var leftGestureEl = document.getElementById('left-gesture');
        var leftConfEl = document.getElementById('left-conf');
        var leftDigitEl = document.getElementById('left-digit');
        var rightGestureEl = document.getElementById('right-gesture');
        var rightConfEl = document.getElementById('right-conf');
        var rightDigitEl = document.getElementById('right-digit');
        var dualStatusEl = document.getElementById('dual-status');
        var resetIndicator = document.getElementById('reset-indicator');
        var proximityBar = document.getElementById('proximity-bar');
        var proximityFill = document.getElementById('proximity-fill');

        var GESTURE_ICONS = {
            'none': '--',
            'fist': '✊ Fist',
            'pinch': '🤏 Pinch',
            'wave': '👋 Wave',
            'pointing': '☝️ Point',
        };

        function formatFingers(f) {
            if (!f) return '';
            var s = '';
            s += f.thumb ? '👍' : '·';
            s += f.index ? '☝' : '·';
            s += f.middle ? '|' : '·';
            s += f.ring ? '|' : '·';
            s += f.pinky ? '|' : '·';
            return s;
        }

        // === Gesture State ===
        var currentLeftGesture = 'none';
        var currentRightGesture = 'none';
        var targetRotY = 0; // left fist: horizontal rotation
        var targetRotX = 0; // right fist: vertical flip
        var targetScale = 1;
        var lastLeftWaveTime = 0, lastRightWaveTime = 0;
        var colorIndex = 0;
        var COLORS = [0x667eea, 0xf093fb, 0x4facfe, 0x43e97b, 0xfa709a, 0xfee140];
        var initialScale = 1;
        var dualPointingBaseDistance = null;

        var isSingleHandMode = false;

        function handleMessage(data) {
            if (data.type === 'no_hand') {
                leftGestureEl.textContent = '--';
                rightGestureEl.textContent = '--';
                leftConfEl.textContent = 'conf: --';
                rightConfEl.textContent = 'conf: --';
                leftDigitEl.textContent = '';
                rightDigitEl.textContent = '';
                dualStatusEl.style.display = 'none';
                proximityBar.style.display = 'none';
                currentLeftGesture = 'none';
                currentRightGesture = 'none';
                isSingleHandMode = false;
                overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
                return;
            }

            isSingleHandMode = (data.type === 'single');

            // Update left hand UI
            if (data.left) {
                currentLeftGesture = data.left.gesture;
                leftGestureEl.textContent = GESTURE_ICONS[data.left.gesture] || data.left.gesture;
                var lconf = (data.left.confidence || 0).toFixed(2);
                var lhconf = (data.left.hand_confidence || 0).toFixed(2);
                var lspeed = (data.left.palm_speed || 0).toFixed(2);
                leftConfEl.textContent = 'conf:' + lconf + ' hand:' + lhconf + ' spd:' + lspeed;
                if (data.left.digit !== undefined) {
                    var fstr = data.left.fingers ? formatFingers(data.left.fingers) : '';
                    leftDigitEl.textContent = '🔢 ' + data.left.digit + ' ' + fstr;
                } else {
                    leftDigitEl.textContent = '';
                }
            } else {
                leftGestureEl.textContent = '--';
                leftConfEl.textContent = 'conf: --';
                leftDigitEl.textContent = '';
                currentLeftGesture = 'none';
            }

            // Update right hand UI
            if (data.right) {
                currentRightGesture = data.right.gesture;
                rightGestureEl.textContent = GESTURE_ICONS[data.right.gesture] || data.right.gesture;
                var rconf = (data.right.confidence || 0).toFixed(2);
                var rhconf = (data.right.hand_confidence || 0).toFixed(2);
                var rspeed = (data.right.palm_speed || 0).toFixed(2);
                rightConfEl.textContent = 'conf:' + rconf + ' hand:' + rhconf + ' spd:' + rspeed;
                if (data.right.digit !== undefined) {
                    var fstr2 = data.right.fingers ? formatFingers(data.right.fingers) : '';
                    rightDigitEl.textContent = '🔢 ' + data.right.digit + ' ' + fstr2;
                } else {
                    rightDigitEl.textContent = '';
                }
            } else {
                rightGestureEl.textContent = '--';
                rightConfEl.textContent = 'conf: --';
                rightDigitEl.textContent = '';
                currentRightGesture = 'none';
            }

            // Process gestures based on mode
            if (isSingleHandMode) {
                var singleData = data.left || data.right;
                if (singleData) processSingleHand(singleData);
                dualStatusEl.style.display = 'block';
                dualStatusEl.textContent = '✋ Single Hand: ' + (data.single_hand || '?');
                proximityBar.style.display = 'none';
            } else {
                // Dual hand mode
                if (data.left) processLeftHand(data.left);
                if (data.right) processRightHand(data.right);

                if (data.dual) {
                    processDual(data.dual);
                    dualStatusEl.style.display = 'block';

                    if (data.dual.dual_pointing_zoom) {
                        dualStatusEl.textContent = '☝️☝️ Dual Point Zoom | dist: ' + (data.dual.pointing_distance || 0).toFixed(3);
                    } else if (data.dual.proximity_progress > 0) {
                        dualStatusEl.textContent = '🤝 Proximity Reset: ' + (data.dual.proximity_progress * 100).toFixed(0) + '%';
                    } else {
                        dualStatusEl.textContent = '👐 Dual Hand Active | dist: ' + (data.dual.palm_distance || 0).toFixed(3);
                    }

                    if (data.dual.proximity_progress > 0) {
                        proximityBar.style.display = 'block';
                        proximityFill.style.width = (data.dual.proximity_progress * 100) + '%';
                    } else {
                        proximityBar.style.display = 'none';
                    }

                    if (data.dual.reset_triggered) {
                        triggerReset();
                    }
                } else {
                    dualStatusEl.style.display = 'none';
                    proximityBar.style.display = 'none';
                    dualPointingBaseDistance = null;
                }
            }

            // Draw hand overlay
            drawHandOverlay(data.left, data.right);
        }

        // Single hand mode: fist = rotate both axes, pinch = scale, wave = color
        function processSingleHand(hand) {
            if (hand.gesture === 'fist') {
                targetRotY = hand.rotation_x || 0;
                targetRotX = hand.rotation_y || 0;
            } else if (hand.gesture === 'pinch') {
                targetScale = hand.scale || 1;
            } else if (hand.gesture === 'wave') {
                var now = Date.now();
                if (now - lastLeftWaveTime > 800) {
                    lastLeftWaveTime = now;
                    colorIndex = (colorIndex + 1) % COLORS.length;
                    triggerColorChange();
                    playWhoosh();
                }
            }
        }

        function processLeftHand(hand) {
            if (hand.gesture === 'fist') {
                targetRotY = hand.rotation_x || 0;
            } else if (hand.gesture === 'wave') {
                var now = Date.now();
                if (now - lastLeftWaveTime > 800) {
                    lastLeftWaveTime = now;
                    colorIndex = (colorIndex + 1) % COLORS.length;
                    triggerColorChange();
                    playWhoosh();
                }
            }
        }

        function processRightHand(hand) {
            if (hand.gesture === 'fist') {
                targetRotX = hand.rotation_y || 0;
            } else if (hand.gesture === 'pinch') {
                targetScale = hand.scale || 1;
            } else if (hand.gesture === 'wave') {
                var now = Date.now();
                if (now - lastRightWaveTime > 800) {
                    lastRightWaveTime = now;
                    triggerExplosion();
                    playExplosion();
                }
            }
        }

        function processDual(dual) {
            if (dual.dual_pointing_zoom && dual.pointing_distance !== null) {
                if (dualPointingBaseDistance === null) {
                    dualPointingBaseDistance = dual.pointing_distance;
                }
                var ratio = dual.pointing_distance / dualPointingBaseDistance;
                targetScale = Math.max(0.3, Math.min(3.0, ratio * initialScale));
            } else {
                if (dualPointingBaseDistance !== null) {
                    initialScale = targetScale;
                    dualPointingBaseDistance = null;
                }
            }
        }

        function drawHandOverlay(leftData, rightData) {
            overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
            var w = overlay.width, h = overlay.height;
            if (!w || !h) return;
            var conn = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];

            if (leftData && leftData.landmarks) {
                drawSingleHand(leftData.landmarks, 'rgba(79,172,254,0.8)', '#4facfe', conn, w, h);
            }
            if (rightData && rightData.landmarks) {
                drawSingleHand(rightData.landmarks, 'rgba(240,147,251,0.8)', '#f093fb', conn, w, h);
            }
        }

        function drawSingleHand(lm, strokeColor, dotColor, conn, w, h) {
            overlayCtx.strokeStyle = strokeColor;
            overlayCtx.lineWidth = 2;
            for (var i = 0; i < conn.length; i++) {
                overlayCtx.beginPath();
                overlayCtx.moveTo(lm[conn[i][0]].x*w, lm[conn[i][0]].y*h);
                overlayCtx.lineTo(lm[conn[i][1]].x*w, lm[conn[i][1]].y*h);
                overlayCtx.stroke();
            }
            for (var j = 0; j < lm.length; j++) {
                overlayCtx.beginPath();
                overlayCtx.arc(lm[j].x*w, lm[j].y*h, 3, 0, 6.28);
                overlayCtx.fillStyle = j === 0 ? '#fff' : dotColor;
                overlayCtx.fill();
            }
        }

        // === Three.js Setup ===
        var threePanel = document.getElementById('three-panel');
        var canvas = document.getElementById('three-canvas');
        var panelWidth = threePanel.clientWidth || window.innerWidth * 0.65;
        var panelHeight = threePanel.clientHeight || window.innerHeight;

        var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(panelWidth, panelHeight);
        renderer.setClearColor(0x0a0a0f, 1);

        var scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        var camera = new THREE.PerspectiveCamera(60, panelWidth / panelHeight, 0.1, 100);
        camera.position.set(0, 0, 6);
        camera.lookAt(0, 0, 0);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        var pointLight1 = new THREE.PointLight(0x667eea, 80, 30);
        pointLight1.position.set(4, 4, 6); scene.add(pointLight1);
        var pointLight2 = new THREE.PointLight(0xf093fb, 60, 30);
        pointLight2.position.set(-4, -3, 5); scene.add(pointLight2);
        var pointLight3 = new THREE.PointLight(0x4facfe, 40, 25);
        pointLight3.position.set(0, 0, -5); scene.add(pointLight3);

        // Torus Knot
        var torusKnot, torusMat, wireframe;
        var torusGeom = new THREE.TorusKnotGeometry(1.2, 0.35, 128, 32);
        torusMat = new THREE.MeshStandardMaterial({ color: COLORS[0], emissive: COLORS[0], emissiveIntensity: 0.4, metalness: 0.3, roughness: 0.4, transparent: true, opacity: 0.9 });
        torusKnot = new THREE.Mesh(torusGeom, torusMat);
        scene.add(torusKnot);
        wireframe = new THREE.Mesh(torusGeom, new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.08 }));
        scene.add(wireframe);

        // Glow
        var glowMat = new THREE.MeshBasicMaterial({ color: COLORS[0], transparent: true, opacity: 0.05, side: THREE.BackSide });
        var glowMesh = new THREE.Mesh(new THREE.SphereGeometry(2.2, 32, 32), glowMat);
        scene.add(glowMesh);

        // === ENERGY HALO (Fist) ===
        var HALO_COUNT = 3;
        var haloRings = [];
        var haloTexture = (function() {
            var c = document.createElement('canvas'); c.width = 256; c.height = 256;
            var ctx = c.getContext('2d');
            var g = ctx.createRadialGradient(128, 128, 70, 128, 128, 128);
            g.addColorStop(0, 'rgba(255,255,255,0)');
            g.addColorStop(0.35, 'rgba(255,200,100,0.5)');
            g.addColorStop(0.55, 'rgba(200,100,255,0.7)');
            g.addColorStop(0.75, 'rgba(100,126,234,0.4)');
            g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g; ctx.fillRect(0, 0, 256, 256);
            return new THREE.CanvasTexture(c);
        })();

        for (var hi = 0; hi < HALO_COUNT; hi++) {
            var hMat = new THREE.SpriteMaterial({ map: haloTexture, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false });
            var hSprite = new THREE.Sprite(hMat);
            hSprite.scale.set(0.1, 0.1, 1);
            hSprite.userData = { phase: hi * 2.094, baseScale: 2.8 + hi * 0.9 };
            scene.add(hSprite);
            haloRings.push(hSprite);
        }

        // === PARTICLE WAVE (Pinch) ===
        var WAVE_P_COUNT = 250;
        var waveGeom = new THREE.BufferGeometry();
        var wavePos = new Float32Array(WAVE_P_COUNT * 3);
        var waveCol = new Float32Array(WAVE_P_COUNT * 3);
        var waveVel = [];
        var waveLife = new Float32Array(WAVE_P_COUNT);
        var waveOn = new Uint8Array(WAVE_P_COUNT);
        for (var wi = 0; wi < WAVE_P_COUNT; wi++) { waveVel.push(new THREE.Vector3()); }
        waveGeom.setAttribute('position', new THREE.BufferAttribute(wavePos, 3));
        waveGeom.setAttribute('color', new THREE.BufferAttribute(waveCol, 3));
        var waveMat = new THREE.PointsMaterial({ size: 0.1, vertexColors: true, transparent: true, opacity: 0.85, blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true });
        scene.add(new THREE.Points(waveGeom, waveMat));

        var lastWaveEmit = 0;
        var _tmpWaveColor = new THREE.Color();

        function emitWaveParticles(intensity) {
            var count = Math.floor(intensity * 15) + 3;
            var emitted = 0;
            for (var i = 0; i < WAVE_P_COUNT && emitted < count; i++) {
                if (waveOn[i]) continue;
                var th = Math.random() * 6.28;
                var ph = Math.random() * 3.14;
                var sp = 0.025 + Math.random() * 0.04 * intensity;
                wavePos[i*3] = 0; wavePos[i*3+1] = 0; wavePos[i*3+2] = 0;
                waveVel[i].set(Math.sin(ph)*Math.cos(th)*sp, Math.sin(ph)*Math.sin(th)*sp, Math.cos(ph)*sp);
                waveLife[i] = 1.0;
                waveOn[i] = 1;
                _tmpWaveColor.setHSL((th/6.28 + intensity*0.3) % 1.0, 0.85, 0.6);
                waveCol[i*3] = _tmpWaveColor.r; waveCol[i*3+1] = _tmpWaveColor.g; waveCol[i*3+2] = _tmpWaveColor.b;
                emitted++;
            }
        }

        // === EXPLOSION PARTICLES (Right wave) ===
        var EXPLODE_COUNT = 400;
        var explodeGeom = new THREE.BufferGeometry();
        var explodePos = new Float32Array(EXPLODE_COUNT * 3);
        var explodeCol = new Float32Array(EXPLODE_COUNT * 3);
        var explodeVel = [];
        var explodeLife = new Float32Array(EXPLODE_COUNT);
        var explodeOn = new Uint8Array(EXPLODE_COUNT);
        for (var ei = 0; ei < EXPLODE_COUNT; ei++) { explodeVel.push(new THREE.Vector3()); }
        explodeGeom.setAttribute('position', new THREE.BufferAttribute(explodePos, 3));
        explodeGeom.setAttribute('color', new THREE.BufferAttribute(explodeCol, 3));
        var explodeMat = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true });
        scene.add(new THREE.Points(explodeGeom, explodeMat));
        var _tmpExplodeColor = new THREE.Color();

        function triggerExplosion() {
            for (var i = 0; i < EXPLODE_COUNT; i++) {
                var th = Math.random() * 6.28;
                var ph = Math.random() * 3.14;
                var sp = 0.05 + Math.random() * 0.12;
                explodePos[i*3] = 0; explodePos[i*3+1] = 0; explodePos[i*3+2] = 0;
                explodeVel[i].set(Math.sin(ph)*Math.cos(th)*sp, Math.sin(ph)*Math.sin(th)*sp, Math.cos(ph)*sp);
                explodeLife[i] = 0.8 + Math.random() * 0.4;
                explodeOn[i] = 1;
                _tmpExplodeColor.setHSL(Math.random(), 0.9, 0.6);
                explodeCol[i*3] = _tmpExplodeColor.r; explodeCol[i*3+1] = _tmpExplodeColor.g; explodeCol[i*3+2] = _tmpExplodeColor.b;
            }
        }

        // === Ambient Particles ===
        var P_COUNT = 1200;
        var partGeom = new THREE.BufferGeometry();
        var partPos = new Float32Array(P_COUNT * 3);
        var partCol = new Float32Array(P_COUNT * 3);
        var partVel = [];
        var partLife = new Float32Array(P_COUNT);
        for (var i = 0; i < P_COUNT; i++) {
            var th = Math.random()*6.28, ph = Math.random()*3.14, r = 1.5+Math.random();
            partPos[i*3] = r*Math.sin(ph)*Math.cos(th);
            partPos[i*3+1] = r*Math.sin(ph)*Math.sin(th);
            partPos[i*3+2] = r*Math.cos(ph);
            partCol[i*3] = 0.4; partCol[i*3+1] = 0.5; partCol[i*3+2] = 0.92;
            partVel.push(new THREE.Vector3((Math.random()-0.5)*0.012, (Math.random()-0.5)*0.012, (Math.random()-0.5)*0.012));
            partLife[i] = Math.random();
        }
        partGeom.setAttribute('position', new THREE.BufferAttribute(partPos, 3));
        partGeom.setAttribute('color', new THREE.BufferAttribute(partCol, 3));
        scene.add(new THREE.Points(partGeom, new THREE.PointsMaterial({ size: 0.045, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true })));

        // Pulse rings (wave/color change)
        var pulseRings = [];
        function createPulseRing() {
            var rg = new THREE.RingGeometry(1.5, 1.8, 48);
            var rm = new THREE.MeshBasicMaterial({ color: COLORS[colorIndex], transparent: true, opacity: 0.7, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });
            var ring = new THREE.Mesh(rg, rm);
            ring.userData = { life: 1.0 };
            scene.add(ring);
            pulseRings.push(ring);
        }

        // Color transition
        var colorTransition = 0;
        var prevColor = new THREE.Color(COLORS[0]);
        var nextColor = new THREE.Color(COLORS[0]);
        var _lerpColor = new THREE.Color();
        var _currentColor = new THREE.Color(COLORS[0]);

        function triggerColorChange() {
            prevColor.copy(torusMat.color);
            nextColor.set(COLORS[colorIndex]);
            colorTransition = 1.0;
            createPulseRing();
            glowMat.color.set(COLORS[colorIndex]);
        }

        // Reset
        function triggerReset() {
            targetRotX = 0;
            targetRotY = 0;
            targetScale = 1;
            initialScale = 1;
            dualPointingBaseDistance = null;
            resetIndicator.style.display = 'block';
            setTimeout(function() { resetIndicator.style.display = 'none'; }, 1500);
        }

        // === Animation Loop ===
        var frameCount = 0, lastFpsTime = performance.now();
        var fpsEl = document.getElementById('fps-counter');
        var smoothRotX = 0, smoothRotY = 0, smoothScale = 1;
        var currentFistStrength = 0;

        function animate() {
            requestAnimationFrame(animate);
            var time = performance.now() * 0.001;
            var now = performance.now();

            // FPS
            frameCount++;
            if (now - lastFpsTime > 1000) {
                fpsEl.textContent = 'FPS: ' + frameCount;
                frameCount = 0;
                lastFpsTime = now;
            }

            // Smooth interpolation
            smoothRotX += (targetRotX - smoothRotX) * 0.08;
            smoothRotY += (targetRotY - smoothRotY) * 0.08;
            smoothScale += (targetScale - smoothScale) * 0.08;

            // Fist strength for halo (max of both hands)
            var leftFist = (currentLeftGesture === 'fist') ? 0.8 : 0;
            var rightFist = (currentRightGesture === 'fist') ? 0.8 : 0;
            var targetFist = Math.max(leftFist, rightFist);
            currentFistStrength += (targetFist - currentFistStrength) * 0.1;

            // Rotation: dual-axis control or single-hand full control
            var fistActive = (currentLeftGesture === 'fist' || currentRightGesture === 'fist');
            if (fistActive) {
                torusKnot.rotation.x = smoothRotX;
                torusKnot.rotation.y = smoothRotY;
            } else {
                torusKnot.rotation.x += 0.004;
                torusKnot.rotation.y += 0.006;
            }
            wireframe.rotation.copy(torusKnot.rotation);

            // Scale
            torusKnot.scale.setScalar(smoothScale);
            wireframe.scale.setScalar(smoothScale);
            glowMesh.scale.setScalar(smoothScale);

            // Color transition
            if (colorTransition > 0) {
                colorTransition -= 0.02;
                if (colorTransition < 0) colorTransition = 0;
                _lerpColor.lerpColors(prevColor, nextColor, 1 - colorTransition);
                torusMat.color.copy(_lerpColor);
                torusMat.emissive.copy(_lerpColor);
                torusMat.emissiveIntensity = 0.4 + colorTransition * 0.6;
            }

            // === ENERGY HALO ===
            for (var hi = 0; hi < HALO_COUNT; hi++) {
                var halo = haloRings[hi];
                var ud = halo.userData;
                if (currentFistStrength > 0.05) {
                    var pulse = Math.sin(time * 2.5 + ud.phase) * 0.25 + 0.75;
                    var tgtScale = ud.baseScale * currentFistStrength * pulse;
                    var curScale = halo.scale.x;
                    var ns = curScale + (tgtScale - curScale) * 0.1;
                    halo.scale.set(ns, ns, 1);
                    halo.material.opacity = currentFistStrength * 0.55 * pulse;
                    halo.material.color.setHSL(((time * 0.15 + hi * 0.22) % 1.0), 0.85, 0.5 + currentFistStrength * 0.25);
                } else {
                    halo.scale.x *= 0.93; halo.scale.y *= 0.93;
                    halo.material.opacity *= 0.9;
                    if (halo.material.opacity < 0.005) halo.material.opacity = 0;
                }
            }

            // === PARTICLE WAVE (pinch) ===
            var pinchActive = (currentRightGesture === 'pinch' || (isSingleHandMode && (currentLeftGesture === 'pinch' || currentRightGesture === 'pinch')));
            if (pinchActive) {
                if (now - lastWaveEmit > 90) {
                    emitWaveParticles(0.7);
                    lastWaveEmit = now;
                }
            }
            var anyWave = false;
            for (var wi = 0; wi < WAVE_P_COUNT; wi++) {
                if (!waveOn[wi]) continue;
                anyWave = true;
                waveLife[wi] -= 0.014;
                if (waveLife[wi] <= 0) {
                    waveOn[wi] = 0;
                    wavePos[wi*3] = 0; wavePos[wi*3+1] = 0; wavePos[wi*3+2] = 0;
                } else {
                    wavePos[wi*3] += waveVel[wi].x;
                    wavePos[wi*3+1] += waveVel[wi].y;
                    wavePos[wi*3+2] += waveVel[wi].z;
                    waveVel[wi].multiplyScalar(0.987);
                }
            }
            if (anyWave) {
                waveGeom.attributes.position.needsUpdate = true;
                waveGeom.attributes.color.needsUpdate = true;
            }

            // === EXPLOSION PARTICLES ===
            var anyExplode = false;
            for (var ei = 0; ei < EXPLODE_COUNT; ei++) {
                if (!explodeOn[ei]) continue;
                anyExplode = true;
                explodeLife[ei] -= 0.018;
                if (explodeLife[ei] <= 0) {
                    explodeOn[ei] = 0;
                    explodePos[ei*3] = 0; explodePos[ei*3+1] = 0; explodePos[ei*3+2] = 0;
                } else {
                    explodePos[ei*3] += explodeVel[ei].x;
                    explodePos[ei*3+1] += explodeVel[ei].y;
                    explodePos[ei*3+2] += explodeVel[ei].z;
                    explodeVel[ei].multiplyScalar(0.975);
                    var fade = explodeLife[ei];
                    explodeCol[ei*3] *= (0.98 + fade * 0.02);
                    explodeCol[ei*3+1] *= (0.97 + fade * 0.03);
                    explodeCol[ei*3+2] *= (0.96 + fade * 0.04);
                }
            }
            if (anyExplode) {
                explodeGeom.attributes.position.needsUpdate = true;
                explodeGeom.attributes.color.needsUpdate = true;
            }

            // === Ambient Particles ===
            _currentColor.set(COLORS[colorIndex]);
            var pp = partGeom.attributes.position.array;
            var pc = partGeom.attributes.color.array;
            for (var i = 0; i < P_COUNT; i++) {
                partLife[i] -= 0.004;
                if (partLife[i] <= 0) {
                    partLife[i] = 1.0;
                    var th2 = Math.random()*6.28, ph2 = Math.random()*3.14, r2 = 1.3+Math.random()*0.6;
                    pp[i*3] = r2*Math.sin(ph2)*Math.cos(th2);
                    pp[i*3+1] = r2*Math.sin(ph2)*Math.sin(th2);
                    pp[i*3+2] = r2*Math.cos(ph2);
                }
                pp[i*3] += partVel[i].x;
                pp[i*3+1] += partVel[i].y;
                pp[i*3+2] += partVel[i].z;
                var dx = pp[i*3], dy = pp[i*3+1], dz = pp[i*3+2];
                var d = Math.sqrt(dx*dx+dy*dy+dz*dz);
                if (d > 3.5) { var n = 1.3/d; pp[i*3]*=n; pp[i*3+1]*=n; pp[i*3+2]*=n; partLife[i]=1.0; }
                var lf = 0.3 + partLife[i]*0.7;
                pc[i*3] = _currentColor.r * lf;
                pc[i*3+1] = _currentColor.g * lf;
                pc[i*3+2] = _currentColor.b * lf;
            }
            partGeom.attributes.position.needsUpdate = true;
            partGeom.attributes.color.needsUpdate = true;

            // Pulse rings
            for (var ri = pulseRings.length - 1; ri >= 0; ri--) {
                var ring = pulseRings[ri];
                ring.userData.life -= 0.012;
                if (ring.userData.life <= 0) {
                    scene.remove(ring); ring.geometry.dispose(); ring.material.dispose();
                    pulseRings.splice(ri, 1);
                } else {
                    var rs = 1 + (1 - ring.userData.life) * 3;
                    ring.scale.set(rs, rs, rs);
                    ring.material.opacity = ring.userData.life * 0.6;
                    ring.rotation.x = torusKnot.rotation.x;
                    ring.rotation.y = torusKnot.rotation.y;
                }
            }

            // Emissive pulse on pinch
            if (pinchActive) {
                torusMat.emissiveIntensity = 0.4 + Math.sin(time*6)*0.3;
                glowMat.opacity = 0.05 + Math.sin(time*6)*0.03;
            } else {
                glowMat.opacity = 0.05;
            }

            // Light orbit
            pointLight1.position.x = Math.sin(time*0.5)*5;
            pointLight1.position.z = Math.cos(time*0.5)*5+2;
            pointLight2.position.x = Math.cos(time*0.7)*4;
            pointLight2.position.y = Math.sin(time*0.7)*4;

            renderer.render(scene, camera);
        }

        animate();

        // Resize
        window.addEventListener('resize', function() {
            var w = threePanel.clientWidth, h = threePanel.clientHeight;
            if (w > 0 && h > 0) { renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); }
        });
        setTimeout(function() {
            var w = threePanel.clientWidth, h = threePanel.clientHeight;
            if (w > 0 && h > 0) { renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); }
        }, 100);
    });
    </script>
</body>
</html>
