<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Gesture 3D Controller - Dual Hand</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: #fff;
        }
        #container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        #video-panel {
            width: 35%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d0d15;
            border-right: 1px solid #1a1a2e;
            position: relative;
        }
        #video-wrapper {
            position: relative;
            width: 90%;
            max-width: 480px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.15);
        }
        #webcam {
            width: 100%;
            display: block;
            transform: scaleX(-1);
        }
        #canvas-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }
        #gesture-info {
            margin-top: 15px;
            width: 90%;
            max-width: 480px;
            display: flex;
            gap: 10px;
        }
        .hand-info {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            font-size: 12px;
        }
        .hand-info.left-hand { border-left: 3px solid #4facfe; }
        .hand-info.right-hand { border-left: 3px solid #f093fb; }
        .hand-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .hand-gesture {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .left-hand .hand-gesture { color: #4facfe; }
        .right-hand .hand-gesture { color: #f093fb; }
        .hand-confidence {
            font-size: 10px;
            color: #666;
        }
        .hand-digit {
            font-size: 20px;
            font-weight: bold;
            margin-top: 4px;
        }
        .left-hand .hand-digit { color: #43e97b; }
        .right-hand .hand-digit { color: #fee140; }
        #dual-status {
            margin-top: 8px;
            padding: 6px 14px;
            background: rgba(255, 200, 50, 0.08);
            border: 1px solid rgba(255, 200, 50, 0.2);
            border-radius: 6px;
            font-size: 11px;
            color: #fda;
            text-align: center;
            width: 90%;
            max-width: 480px;
            display: none;
        }
        #three-panel {
            width: 65%;
            height: 100%;
            position: relative;
        }
        #three-canvas {
            width: 100%; height: 100%;
            display: block;
        }
        #fps-counter {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 12px;
            color: #4f4;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 10;
        }
        #status {
            position: absolute;
            top: 10px; left: 15px;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(0,0,0,0.6);
            z-index: 10;
        }
        .connected { color: #4f4; }
        .disconnected { color: #f44; }
        #title-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 12px 20px;
            background: linear-gradient(180deg, rgba(10,10,15,0.9), transparent);
            z-index: 10;
            pointer-events: none;
        }
        #title-bar h1 {
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #error-display {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.4);
            color: #faa;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            display: none;
            z-index: 20;
        }
        #reset-indicator {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 12px;
            border: 2px solid #4facfe;
            display: none;
            z-index: 30;
            animation: pulse-border 0.5s ease-in-out;
        }
        @keyframes pulse-border {
            0%, 100% { border-color: #4facfe; }
            50% { border-color: #f093fb; }
        }
        #proximity-bar {
            position: absolute;
            bottom: 60px; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            display: none;
            z-index: 15;
        }
        #proximity-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4facfe, #f093fb);
            border-radius: 3px;
            transition: width 0.1s;
        }
        /* === 语音控制按钮 === */
        #voice-toggle {
            position: absolute;
            bottom: 15px; left: 15px;
            width: 42px; height: 42px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.6);
            color: #888;
            font-size: 18px;
            cursor: pointer;
            z-index: 20;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #voice-toggle:hover { border-color: rgba(255,255,255,0.5); }
        #voice-toggle.active {
            color: #4ade80;
            border-color: #4ade80;
            box-shadow: 0 0 12px rgba(74,222,128,0.4);
            animation: voice-pulse 1.5s infinite;
        }
        @keyframes voice-pulse {
            0%, 100% { box-shadow: 0 0 12px rgba(74,222,128,0.4); }
            50% { box-shadow: 0 0 20px rgba(74,222,128,0.7); }
        }
        /* === 调试面板按钮 === */
        #debug-toggle {
            position: absolute;
            bottom: 15px; left: 65px;
            width: 42px; height: 42px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.6);
            color: #888;
            font-size: 16px;
            cursor: pointer;
            z-index: 20;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #debug-toggle:hover { border-color: rgba(255,255,255,0.5); color: #fff; }
        #debug-toggle.active { color: #fbbf24; border-color: #fbbf24; }
        /* === 序列识别状态 === */
        #sequence-status {
            position: absolute;
            top: 45px; left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: bold;
            color: #4ade80;
            background: rgba(0,0,0,0.7);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(74,222,128,0.3);
            z-index: 25;
            display: none;
            transition: opacity 0.5s;
            white-space: nowrap;
        }
        /* === 调试面板样式 === */
        #debug-container {
            position: absolute;
            right: 10px; bottom: 65px;
            width: 380px;
            max-height: 70vh;
            z-index: 50;
            pointer-events: auto;
        }
        .dp-panel {
            background: rgba(10, 10, 20, 0.92);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        }
        .dp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .dp-title { font-size: 12px; font-weight: bold; color: #e2e8f0; }
        .dp-close {
            background: none; border: none; color: #94a3b8; font-size: 16px;
            cursor: pointer; padding: 2px 6px; border-radius: 4px;
        }
        .dp-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .dp-body {
            padding: 8px 12px;
            max-height: 55vh;
            overflow-y: auto;
            font-size: 11px;
        }
        .dp-body::-webkit-scrollbar { width: 4px; }
        .dp-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        .dp-section {
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .dp-section:last-child { border-bottom: none; margin-bottom: 0; }
        .dp-section-title {
            font-size: 10px; font-weight: bold; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
        }
        .dp-gesture-stream {
            display: flex; flex-wrap: wrap; gap: 3px; align-items: center;
            min-height: 24px; padding: 4px 0;
        }
        .dp-seg { font-size: 11px; display: inline-flex; align-items: center; gap: 2px; }
        .dp-seg small { font-size: 9px; opacity: 0.7; }
        .dp-arrow { color: #475569; font-size: 10px; margin: 0 1px; }
        .dp-sequence-name {
            font-size: 12px; font-weight: bold; color: #4ade80;
            padding: 3px 0; transition: opacity 0.5s;
        }
        .dp-voice-status { font-size: 11px; margin-bottom: 4px; }
        .dp-speech-interim {
            font-size: 11px; color: #fbbf24; font-style: italic;
            padding: 2px 0; margin-bottom: 3px;
        }
        .dp-speech-logs, .dp-fusion-logs { max-height: 100px; overflow-y: auto; }
        .dp-speech-entry, .dp-fusion-entry {
            font-size: 10px; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
            color: #cbd5e1;
        }
        .dp-time { color: #64748b; }
        .dp-speech-text { color: #e2e8f0; }
        .dp-conf { color: #94a3b8; font-size: 9px; }
        .dp-intent { color: #a78bfa; font-weight: bold; }
        .dp-setting { margin-bottom: 6px; }
        .dp-setting label { font-size: 10px; color: #94a3b8; }
        .dp-slider {
            width: 100%; height: 4px; margin-top: 4px;
            -webkit-appearance: none; appearance: none;
            background: rgba(255,255,255,0.1); border-radius: 2px; outline: none;
        }
        .dp-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 12px; height: 12px; border-radius: 50%;
            background: #8b5cf6; cursor: pointer;
        }
        .dp-radio-group { display: flex; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
        .dp-radio-group label { font-size: 10px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; gap: 3px; }
        .dp-radio-group input { margin: 0; }
        .dp-actions { display: flex; gap: 6px; margin-top: 6px; }
        .dp-btn {
            font-size: 10px; padding: 4px 10px; border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
            color: #e2e8f0; cursor: pointer; transition: all 0.2s;
        }
        .dp-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
        .dp-btn-recording {
            border-color: #ef4444; color: #ef4444;
            animation: rec-blink 1s infinite;
        }
        @keyframes rec-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="title-bar"><h1>Magic Gesture 3D Controller - Dual Hand</h1></div>
    <div id="container">
        <div id="video-panel">
            <div id="video-wrapper">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="canvas-overlay"></canvas>
            </div>
            <div id="gesture-info">
                <div class="hand-info left-hand">
                    <div class="hand-label">LEFT HAND</div>
                    <div class="hand-gesture" id="left-gesture">--</div>
                    <div class="hand-confidence" id="left-conf">conf: --</div>
                    <div class="hand-digit" id="left-digit"></div>
                </div>
                <div class="hand-info right-hand">
                    <div class="hand-label">RIGHT HAND</div>
                    <div class="hand-gesture" id="right-gesture">--</div>
                    <div class="hand-confidence" id="right-conf">conf: --</div>
                    <div class="hand-digit" id="right-digit"></div>
                </div>
            </div>
            <div id="dual-status"></div>
        </div>
        <div id="three-panel">
            <canvas id="three-canvas"></canvas>
            <div id="fps-counter">FPS: --</div>
            <div id="status" class="disconnected">● Disconnected</div>
            <div id="reset-indicator">RESET</div>
            <div id="proximity-bar"><div id="proximity-fill"></div></div>
            <div id="error-display"></div>
            <div id="sequence-status"></div>
            <button id="voice-toggle" title="语音控制 (点击启用)">🎤</button>
            <button id="debug-toggle" title="调试面板">🔧</button>
            <div id="debug-container"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
    <script>if (typeof THREE === 'undefined') document.write('<script src="/static/three.min.js"><\/script>');</script>
    <!-- 多模态交互模块 -->
    <script src="/static/js/gesture-sequence.js"></script>
    <script src="/static/js/voice-recognition.js"></script>
    <script src="/static/js/multimodal-fusion.js"></script>
    <script src="/static/js/debug-panel.js"></script>
    <script>
    window.addEventListener('DOMContentLoaded', function() {
        if (typeof THREE === 'undefined') {
            document.getElementById('error-display').textContent = 'Three.js failed to load';
            document.getElementById('error-display').style.display = 'block';
            return;
        }

        // === Audio ===
        var audioCtx = null;
        function playWhoosh() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                var d = 0.3, t = audioCtx.currentTime;
                var osc = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                var filter = audioCtx.createBiquadFilter();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, t);
                osc.frequency.exponentialRampToValueAtTime(200, t + d);
                filter.type = 'bandpass'; filter.frequency.setValueAtTime(1000, t);
                filter.frequency.exponentialRampToValueAtTime(300, t + d); filter.Q.value = 2;
                gain.gain.setValueAtTime(0.25, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + d);
                osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(t + d);
            } catch (e) {}
        }
        function playExplosion() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                var d = 0.5, t = audioCtx.currentTime;
                var noise = audioCtx.createBufferSource();
                var buf = audioCtx.createBuffer(1, audioCtx.sampleRate * d, audioCtx.sampleRate);
                var data = buf.getChannelData(0);
                for (var i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.1));
                noise.buffer = buf;
                var gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.4, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + d);
                noise.connect(gain); gain.connect(audioCtx.destination);
                noise.start(); noise.stop(t + d);
            } catch (e) {}
        }

        // === WebSocket ===
        var ws = null, wsReady = false;
        var statusEl = document.getElementById('status');
        function connectWS() {
            try {
                ws = new WebSocket('ws://' + location.host + '/ws');
                ws.onopen = function() { wsReady = true; statusEl.textContent = '● Connected'; statusEl.className = 'connected'; };
                ws.onclose = function() { wsReady = false; statusEl.textContent = '● Disconnected'; statusEl.className = 'disconnected'; setTimeout(connectWS, 2000); };
                ws.onerror = function() { ws.close(); };
                ws.onmessage = function(ev) { try { handleMessage(JSON.parse(ev.data)); } catch(e) {} };
            } catch(e) { setTimeout(connectWS, 3000); }
        }
        connectWS();

        // === Camera ===
        var video = document.getElementById('webcam');
        var overlay = document.getElementById('canvas-overlay');
        var overlayCtx = overlay.getContext('2d');
        var sendCanvas = document.createElement('canvas');
        sendCanvas.width = 320; sendCanvas.height = 240;
        var sendCtx = sendCanvas.getContext('2d');

        navigator.mediaDevices.getUserMedia({
            video: { width: 320, height: 240, frameRate: { ideal: 20, max: 30 } }
        }).then(function(stream) {
            video.srcObject = stream;
            video.onloadedmetadata = function() {
                overlay.width = video.videoWidth;
                overlay.height = video.videoHeight;
                startSending();
            };
        }).catch(function(err) {
            document.getElementById('left-gesture').textContent = 'No Camera';
        });

        var lastSendTime = 0;
        var SEND_INTERVAL = 55;
        function startSending() {
            function tick() {
                requestAnimationFrame(tick);
                var now = performance.now();
                if (now - lastSendTime < SEND_INTERVAL || !wsReady) return;
                lastSendTime = now;
                sendCtx.drawImage(video, 0, 0, 320, 240);
                try { ws.send(JSON.stringify({ type: 'frame', data: sendCanvas.toDataURL('image/jpeg', 0.55) })); } catch(e) {}
            }
            tick();
        }

        // === UI Elements ===
        var leftGestureEl = document.getElementById('left-gesture');
        var leftConfEl = document.getElementById('left-conf');
        var leftDigitEl = document.getElementById('left-digit');
        var rightGestureEl = document.getElementById('right-gesture');
        var rightConfEl = document.getElementById('right-conf');
        var rightDigitEl = document.getElementById('right-digit');
        var dualStatusEl = document.getElementById('dual-status');
        var resetIndicator = document.getElementById('reset-indicator');
        var proximityBar = document.getElementById('proximity-bar');
        var proximityFill = document.getElementById('proximity-fill');

        var GESTURE_ICONS = {
            'none': '— 未检测到手势',
            'fist': '✊ Fist',
            'pinch': '🤏 Pinch',
            'wave': '👋 Wave',
            'pointing': '☝️ Point',
        };

        function formatFingers(f) {
            if (!f) return '';
            var s = '';
            s += f.thumb ? '👍' : '·';
            s += f.index ? '☝' : '·';
            s += f.middle ? '|' : '·';
            s += f.ring ? '|' : '·';
            s += f.pinky ? '|' : '·';
            return s;
        }

        // === Gesture State ===
        var currentLeftGesture = 'none';
        var currentRightGesture = 'none';
        var targetRotY = 0; // left fist: horizontal rotation
        var targetRotX = 0; // right fist: vertical flip
        var targetScale = 1;
        var lastLeftWaveTime = 0, lastRightWaveTime = 0;
        var colorIndex = 0;
        var COLORS = [0x667eea, 0xf093fb, 0x4facfe, 0x43e97b, 0xfa709a, 0xfee140];
        var initialScale = 1;
        var dualPointingBaseDistance = null;

        var isSingleHandMode = false;

        // 防抖：记录上次UI显示值，仅在变化时更新DOM
        var _prevLeftGesture = '--', _prevLeftConf = '', _prevLeftDigit = '';
        var _prevRightGesture = '--', _prevRightConf = '', _prevRightDigit = '';
        var _prevDualStatus = '';

        function handleMessage(data) {
            if (data.type === 'no_hand') {
                var noHandText = '— 未检测到手势';
                if (_prevLeftGesture !== noHandText) { leftGestureEl.textContent = noHandText; _prevLeftGesture = noHandText; }
                if (_prevRightGesture !== noHandText) { rightGestureEl.textContent = noHandText; _prevRightGesture = noHandText; }
                var noConf = '等待检测...';
                if (_prevLeftConf !== noConf) { leftConfEl.textContent = noConf; _prevLeftConf = noConf; }
                if (_prevRightConf !== noConf) { rightConfEl.textContent = noConf; _prevRightConf = noConf; }
                if (_prevLeftDigit !== '') { leftDigitEl.textContent = ''; _prevLeftDigit = ''; }
                if (_prevRightDigit !== '') { rightDigitEl.textContent = ''; _prevRightDigit = ''; }
                dualStatusEl.style.display = 'none';
                proximityBar.style.display = 'none';
                currentLeftGesture = 'none';
                currentRightGesture = 'none';
                isSingleHandMode = false;
                overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
                return;
            }

            isSingleHandMode = (data.type === 'single');

            // Update left hand UI（仅在变化时写DOM）
            if (data.left) {
                currentLeftGesture = data.left.gesture;
                var lgText = GESTURE_ICONS[data.left.gesture] || data.left.gesture;
                if (lgText !== _prevLeftGesture) { leftGestureEl.textContent = lgText; _prevLeftGesture = lgText; }
                var lconf = 'conf:' + (data.left.confidence || 0).toFixed(2) + ' hand:' + (data.left.hand_confidence || 0).toFixed(2) + ' spd:' + (data.left.palm_speed || 0).toFixed(2);
                if (lconf !== _prevLeftConf) { leftConfEl.textContent = lconf; _prevLeftConf = lconf; }
                if (data.left.digit !== undefined) {
                    var fstr = data.left.fingers ? formatFingers(data.left.fingers) : '';
                    var ldText = '🔢 ' + data.left.digit + ' ' + fstr;
                    if (ldText !== _prevLeftDigit) { leftDigitEl.textContent = ldText; _prevLeftDigit = ldText; }
                } else {
                    if (_prevLeftDigit !== '') { leftDigitEl.textContent = ''; _prevLeftDigit = ''; }
                }
            } else {
                var lNoHand = '— 未检测到手势';
                if (_prevLeftGesture !== lNoHand) { leftGestureEl.textContent = lNoHand; _prevLeftGesture = lNoHand; }
                if (_prevLeftConf !== '等待检测...') { leftConfEl.textContent = '等待检测...'; _prevLeftConf = '等待检测...'; }
                if (_prevLeftDigit !== '') { leftDigitEl.textContent = ''; _prevLeftDigit = ''; }
                currentLeftGesture = 'none';
            }

            // Update right hand UI（仅在变化时写DOM）
            if (data.right) {
                currentRightGesture = data.right.gesture;
                var rgText = GESTURE_ICONS[data.right.gesture] || data.right.gesture;
                if (rgText !== _prevRightGesture) { rightGestureEl.textContent = rgText; _prevRightGesture = rgText; }

            pointLight1.position.z = Math.cos(time*0.5)*5+2;
            pointLight2.position.x = Math.cos(time*0.7)*4;
            pointLight2.position.y = Math.sin(time*0.7)*4;

            renderer.render(scene, camera);
        }

        animate();

        // Resize
        window.addEventListener('resize', function() {
            var w = threePanel.clientWidth, h = threePanel.clientHeight;
            if (w > 0 && h > 0) { renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); }
        });
        setTimeout(function() {
            var w = threePanel.clientWidth, h = threePanel.clientHeight;
            if (w > 0 && h > 0) { renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); }
        }, 100);

        // ============================================================
        // 多模态交互系统集成
        // ============================================================

        // === 材质系统（用于切换材质命令） ===
        var materialIndex = 0;
        var MATERIALS = [
            { name: '标准', metalness: 0.3, roughness: 0.4, opacity: 0.9 },
            { name: '金属', metalness: 0.9, roughness: 0.1, opacity: 1.0 },
            { name: '玻璃', metalness: 0.1, roughness: 0.05, opacity: 0.5 },
            { name: '陶瓷', metalness: 0.0, roughness: 0.8, opacity: 1.0 },
            { name: '霓虹', metalness: 0.5, roughness: 0.3, opacity: 0.85 }
        ];

        function cycleMaterial() {
            materialIndex = (materialIndex + 1) % MATERIALS.length;
            var mat = MATERIALS[materialIndex];
            torusMat.metalness = mat.metalness;
            torusMat.roughness = mat.roughness;
            torusMat.opacity = mat.opacity;
            torusMat.needsUpdate = true;
        }

        // === 手势序列识别器 ===
        var gestureSeq = new GestureSequenceRecognizer({
            matchThreshold: 0.55,
            bufferSize: 80,
            checkInterval: 4
        });

        // === 语音识别器 ===
        var voiceRecog = new VoiceCommandRecognizer({ lang: 'zh-CN' });

        // === 多模态融合引擎 ===
        var fusion = new MultimodalFusion({
            timeWindow: 500,
            priorityMode: 'recent',
            executeCooldown: 800
        });

        // === 调试面板 ===
        var debugPanel = new DebugPanel('debug-container');
        debugPanel.init();

        // === 意图执行器 ===
        function executeIntent(intent) {
            switch (intent) {
                case 'switch_material':
                    cycleMaterial();
                    break;
                case 'reset_view':
                    triggerReset();
                    break;
                case 'show_help':
                    debugPanel.toggle();
                    break;
                case 'zoom_in':
                    targetScale = Math.min(3.0, targetScale * 1.3);
                    break;
                case 'zoom_out':
                    targetScale = Math.max(0.3, targetScale * 0.7);
                    break;
                case 'rotate_left':
                    targetRotY -= 0.5;
                    break;
                case 'rotate_right':
                    targetRotY += 0.5;
                    break;
                case 'change_color':
                    colorIndex = (colorIndex + 1) % COLORS.length;
                    triggerColorChange();
                    playWhoosh();
                    break;
                case 'explode':
                    triggerExplosion();
                    playExplosion();
                    break;
                case 'toggle_wireframe':
                    wireframe.visible = !wireframe.visible;
                    break;
                case 'particle_burst':
                    emitWaveParticles(1.0);
                    break;
                case 'stop':
                    // 停止自动旋转（通过将当前旋转设为目标）
                    targetRotX = torusKnot.rotation.x;
                    targetRotY = torusKnot.rotation.y;
                    break;
            }
        }

        // === 事件接线 ===

        // 手势序列 → 融合引擎 + 调试面板
        gestureSeq.onSequenceRecognized(function(name, confidence, action) {
            fusion.feedGestureEvent(action, confidence, Date.now());
            debugPanel.updateSequenceName(name, confidence);
        });

        // 语音 → 融合引擎 + 调试面板
        voiceRecog.onCommand(function(intent, confidence, rawText, timestamp) {
            fusion.feedVoiceEvent(intent, confidence, timestamp);
            debugPanel.addSpeechText(rawText, true, confidence);
        });
        voiceRecog.onInterim(function(text) {
            debugPanel.addSpeechText(text, false, null);
        });
        voiceRecog.onStateChange(function(active) {
            debugPanel.updateVoiceState(active);
            var btn = document.getElementById('voice-toggle');
            if (btn) {
                btn.className = active ? 'active' : '';
            }
        });
        voiceRecog.onError(function(errorCode, message) {
            // 在错误显示区域显示语音错误
            var errEl = document.getElementById('error-display');
            if (errEl) {
                errEl.textContent = '🎤 ' + message;
                errEl.style.display = 'block';
                setTimeout(function() { errEl.style.display = 'none'; }, 5000);
            }
            // 更新按钮状态
            var btn = document.getElementById('voice-toggle');
            if (btn) {
                btn.className = '';
                btn.title = '语音不可用: ' + message;
            }
            debugPanel.updateVoiceState(false);
            console.error('[Voice] ' + errorCode + ': ' + message);
        });

        // 语音不支持时的降级显示
        if (!voiceRecog.isSupported()) {
            var voiceBtn = document.getElementById('voice-toggle');
            if (voiceBtn) {
                voiceBtn.title = '语音不支持（需Chrome/Edge浏览器）';
                voiceBtn.style.opacity = '0.4';
                voiceBtn.style.cursor = 'not-allowed';
            }
            debugPanel.updateVoiceState(false);
        }

        // 融合引擎 → 动作执行 + 调试面板
        fusion.onAction(function(intent, source, confidence, logEntry) {
            debugPanel.addFusionLog(logEntry);
            executeIntent(intent);
        });

        // === 调试面板事件 ===
        debugPanel.on('thresholdChange', function(value) {
            gestureSeq.setThreshold(value);
        });
        debugPanel.on('priorityChange', function(mode) {
            fusion.setPriorityMode(mode);
        });
        debugPanel.on('recordToggle', function() {
            if (gestureSeq.isRecording()) {
                var name = prompt('请输入手势序列名称:');
                if (name) {
                    var action = prompt('请输入触发动作（如 switch_material, change_color, explode）:', 'change_color');
                    if (action) {
                        var ok = gestureSeq.stopRecording(name, action);
                        if (!ok) {
                            alert('录制失败：序列太短或已达上限(5个)');
                        }
                    } else {
                        gestureSeq.stopRecording(name, 'change_color');
                    }
                } else {
                    // 取消录制
                    gestureSeq._isRecording = false;
                    gestureSeq._recordBuffer = [];
                }
                debugPanel.updateRecordingState(false, gestureSeq.getCustomCount());
            } else {
                gestureSeq.startRecording();
                debugPanel.updateRecordingState(true, gestureSeq.getCustomCount());
            }
        });
        debugPanel.on('clearTemplates', function() {
            if (confirm('确定清空所有自定义手势模板？')) {
                var templates = gestureSeq.getTemplates();
                templates.forEach(function(t) {
                    if (t.custom) gestureSeq.removeCustomTemplate(t.name);
                });
                debugPanel.updateRecordingState(false, 0);
            }
        });

        // === 语音控制按钮 ===
        var voiceToggleBtn = document.getElementById('voice-toggle');
        if (voiceToggleBtn) {
            voiceToggleBtn.addEventListener('click', function() {
                if (!voiceRecog.isSupported()) {
                    var errEl = document.getElementById('error-display');
                    if (errEl) {
                        errEl.textContent = '🎤 语音不支持：请使用Chrome或Edge浏览器';
                        errEl.style.display = 'block';
                        setTimeout(function() { errEl.style.display = 'none'; }, 4000);
                    }
                    return;
                }
                if (voiceRecog.isActive()) {
                    voiceRecog.stop();
                } else {
                    voiceRecog.start();
                }
            });
        }

        // === 调试面板切换按钮 ===
        var debugToggleBtn = document.getElementById('debug-toggle');
        if (debugToggleBtn) {
            debugToggleBtn.addEventListener('click', function() {
                debugPanel.toggle();
                debugToggleBtn.className = debugPanel.isVisible() ? 'active' : '';
            });
        }

        // === 将手势数据馈入序列识别器（在handleMessage中集成） ===
        var _origHandleMessage = handleMessage;
        handleMessage = function(data) {
            _origHandleMessage(data);

            // 提取当前帧的主手势馈入序列识别器
            var gesture = 'none';
            if (data.type === 'single') {
                var sd = data.left || data.right;
                if (sd) gesture = sd.gesture;
            } else if (data.type === 'dual') {
                // 双手模式：优先使用右手手势
                if (data.right && data.right.gesture !== 'none') {
                    gesture = data.right.gesture;
                } else if (data.left && data.left.gesture !== 'none') {
                    gesture = data.left.gesture;
                }
            }

            gestureSeq.feedGesture(gesture, Date.now());

            // 更新调试面板手势流（节流由面板内部控制）
            if (debugPanel.isVisible()) {
                debugPanel.updateGestureStream(gestureSeq.getRecentSegments());
            }
        };

        // 初始化调试面板模板计数
        debugPanel.updateRecordingState(false, gestureSeq.getCustomCount());
    });
    </script>
</body>
</html>
